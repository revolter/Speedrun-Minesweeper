name: Deploy Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.preview_url.outputs.url }}
    steps:
      - name: Checkout production content (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - name: Checkout preview content (PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: preview
      - name: Build combined Pages artifact (prod + preview path)
        run: |
          mkdir -p site
          cp -R main/public/. site/
          mkdir -p site/preview/pr-${{ github.event.pull_request.number }}
          cp -R preview/public/. site/preview/pr-${{ github.event.pull_request.number }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
      - id: preview_url
        run: |
          base="${{ steps.deployment.outputs.page_url }}"
          base="${base%/}/"
          echo "url=${base}preview/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview_url.outputs.url }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = [
              marker,
              '🚀 Preview deployment is ready:',
              process.env.PREVIEW_URL
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
